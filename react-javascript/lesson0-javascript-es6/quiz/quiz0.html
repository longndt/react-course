<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Quiz - JavaScript ES6+ Fundamentals</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
      }

      .header {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
        text-align: center;
      }

      .header h1 {
        color: #667eea;
        margin-bottom: 10px;
      }

      .header p {
        color: #666;
        font-size: 14px;
      }

      .progress-bar {
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
      }

      .progress-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 14px;
        color: #666;
      }

      .progress-track {
        width: 100%;
        height: 10px;
        background: #e0e0e0;
        border-radius: 5px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        transition: width 0.3s ease;
      }

      .quiz-card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
      }

      .question-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .question-number {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
      }

      .question-type {
        color: #999;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .question {
        font-size: 20px;
        font-weight: 600;
        color: #333;
        margin-bottom: 25px;
        line-height: 1.5;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option {
        padding: 16px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: white;
      }

      .option:hover {
        border-color: #667eea;
        background: #f8f9ff;
      }

      .option.selected {
        border-color: #667eea;
        background: #f0f3ff;
      }

      .option.correct {
        border-color: #10b981;
        background: #d1fae5;
      }

      .option.incorrect {
        border-color: #ef4444;
        background: #fee2e2;
      }

      .short-answer {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-family: inherit;
      }

      .short-answer:focus {
        outline: none;
        border-color: #667eea;
      }

      .buttons {
        display: flex;
        gap: 12px;
        margin-top: 30px;
      }

      .btn {
        flex: 1;
        padding: 14px 24px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: #f3f4f6;
        color: #666;
      }

      .btn-secondary:hover {
        background: #e5e7eb;
      }

      .feedback {
        padding: 16px 20px;
        border-radius: 10px;
        margin-top: 20px;
        font-weight: 500;
      }

      .feedback.correct {
        background: #d1fae5;
        color: #065f46;
        border: 2px solid #10b981;
      }

      .feedback.incorrect {
        background: #fee2e2;
        color: #991b1b;
        border: 2px solid #ef4444;
      }

      .results-card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .results-card h2 {
        color: #667eea;
        font-size: 32px;
        margin-bottom: 30px;
      }

      .score-circle {
        width: 180px;
        height: 180px;
        margin: 0 auto 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: bold;
        color: white;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin: 30px 0;
      }

      .stat {
        padding: 20px;
        background: #f8f9fa;
        border-radius: 10px;
      }

      .stat-label {
        color: #666;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: bold;
        color: #333;
      }

      .feedback {
        font-size: 18px;
        margin: 30px 0;
        padding: 20px;
        border-radius: 10px;
      }

      .feedback.excellent {
        background: #d1fae5;
        color: #065f46;
      }

      .feedback.good {
        background: #dbeafe;
        color: #1e40af;
      }

      .feedback.average {
        background: #fef3c7;
        color: #92400e;
      }

      .feedback.needs-improvement {
        background: #fee2e2;
        color: #991b1b;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 600px) {
        .stats {
          grid-template-columns: 1fr;
        }

        .score-circle {
          width: 150px;
          height: 150px;
          font-size: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1> JavaScript ES6+ Fundamentals Quiz</h1>
        <p>Test your knowledge of modern JavaScript features and best practices</p>
      </div>

      <!-- Progress Bar -->
      <div id="progressBar" class="progress-bar">
        <div class="progress-info">
          <span id="progressText">Question 1 of 20</span>
          <span id="answeredText">0 answered</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Quiz Card -->
      <div id="quizCard" class="quiz-card">
        <div class="question-header">
          <span class="question-number" id="questionNumber">Question 1</span>
          <span class="question-type" id="questionType">Multiple Choice</span>
        </div>

        <div id="questionText" class="question"></div>

        <div id="optionsContainer"></div>

        <div id="feedbackContainer"></div>

        <div class="buttons">
          <button id="checkBtn" class="btn btn-primary">Check Answer</button>
          <button id="nextBtn" class="btn btn-secondary" style="display: none">
            Next Question
          </button>
        </div>
      </div>

      <!-- Results Card (hidden initially) -->
      <div id="resultsCard" class="results-card hidden">
        <h2> Quiz Complete!</h2>

        <div class="score-circle">
          <span id="scorePercentage">0%</span>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">Correct</div>
            <div class="stat-value" id="correctCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Incorrect</div>
            <div class="stat-value" id="incorrectCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Skipped</div>
            <div class="stat-value" id="skippedCount">0</div>
          </div>
        </div>

        <div id="feedback" class="feedback"></div>

        <button class="btn btn-primary" onclick="location.reload()">
          Retake Quiz
        </button>
      </div>
    </div>

    <script>
      // Quiz Data - JavaScript ES6+ Fundamentals
      const quizData = [
        // Multiple Choice Questions (1-15)
        {
          type: "multiple",
          question: "What is the difference between let and const?",
          options: [
            "let is block-scoped, const is function-scoped",
            "let can be reassigned, const cannot be reassigned",
            "const is faster than let",
            "There is no difference",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What is the main advantage of arrow functions?",
          options: [
            "They are faster than regular functions",
            "They lexically bind 'this' context",
            "They can only be used for callbacks",
            "They don't need parentheses",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What does destructuring allow you to do?",
          options: [
            "Delete properties from objects",
            "Extract values from arrays or objects into distinct variables",
            "Combine multiple objects into one",
            "Convert objects to arrays",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What does the spread operator (...) do?",
          options: [
            "Creates a deep copy of an object",
            "Expands an iterable into individual elements",
            "Merges all properties from multiple objects",
            "Both B and C",
          ],
          correct: 3,
        },
        {
          type: "multiple",
          question: "What does the rest parameter (...) do in function arguments?",
          options: [
            "Copies all function arguments",
            "Collects remaining arguments into an array",
            "Spreads array into individual parameters",
            "Makes all parameters optional",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "Which array method creates a new array with transformed elements?",
          options: ["forEach()", "map()", "filter()", "reduce()"],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What does async/await help with?",
          options: [
            "Writing asynchronous code that looks synchronous",
            "Making code run faster",
            "Creating multiple threads",
            "Handling errors automatically",
          ],
          correct: 0,
        },
        {
          type: "multiple",
          question: "How do you export a default function from a module?",
          options: [
            "module.exports = function",
            "export default function myFunction() {}",
            "export function myFunction() {}",
            "default export myFunction",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What does optional chaining (?.) do?",
          options: [
            "Makes a property optional",
            "Safely accesses nested properties without throwing errors",
            "Creates a conditional statement",
            "Checks if a value is null",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What is the difference between == and ===?",
          options: [
            "No difference",
            "=== checks type and value, == only checks value with type coercion",
            "== is faster than ===",
            "=== is deprecated",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What does the nullish coalescing operator (??) do?",
          options: [
            "Returns right side if left is null or undefined",
            "Returns right side if left is falsy",
            "Checks if value is null",
            "Converts null to undefined",
          ],
          correct: 0,
        },
        {
          type: "multiple",
          question: "What will Promise.all() do?",
          options: [
            "Run promises sequentially",
            "Wait for all promises to resolve or one to reject",
            "Run only the first promise",
            "Cancel all promises",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What is a template literal?",
          options: [
            "A string that uses backticks (`) and allows interpolation",
            "A function template",
            "An HTML template",
            "A class template",
          ],
          correct: 0,
        },
        {
          type: "multiple",
          question: "What does Object.freeze() do?",
          options: [
            "Deletes all object properties",
            "Makes an object immutable (cannot add, delete, or modify properties)",
            "Copies an object",
            "Converts object to JSON",
          ],
          correct: 1,
        },
        {
          type: "multiple",
          question: "What is the purpose of Promise.race()?",
          options: [
            "Run all promises in parallel",
            "Returns the result of the fastest promise (first to settle)",
            "Cancels slow promises",
            "Measures promise execution time",
          ],
          correct: 1,
        },

        // Short Answer Questions (16-20)
        {
          type: "short",
          question: "What keyword is used to declare a block-scoped variable?",
          answer: "let",
        },
        {
          type: "short",
          question: "What symbol is used to create arrow functions? (=> or ->)",
          answer: "=>",
        },
        {
          type: "short",
          question: "What method is used to create a shallow copy of an array?",
          answer: "slice",
        },
        {
          type: "short",
          question: "What keyword is used before async functions?",
          answer: "async",
        },
        {
          type: "short",
          question: "What character wraps template literals?",
          answer: "`",
        },
      ];

      // State
      let currentQuestion = 0;
      let userAnswers = new Array(quizData.length).fill(null);
      let answerChecked = new Array(quizData.length).fill(false);

      // DOM Elements
      const progressText = document.getElementById("progressText");
      const answeredText = document.getElementById("answeredText");
      const progressFill = document.getElementById("progressFill");
      const quizCard = document.getElementById("quizCard");
      const resultsCard = document.getElementById("resultsCard");
      const questionNumber = document.getElementById("questionNumber");
      const questionType = document.getElementById("questionType");
      const questionText = document.getElementById("questionText");
      const optionsContainer = document.getElementById("optionsContainer");
      const feedbackContainer = document.getElementById("feedbackContainer");
      const checkBtn = document.getElementById("checkBtn");
      const nextBtn = document.getElementById("nextBtn");

      // Initialize
      function init() {
        renderQuestion();
        updateProgress();
      }

      // Render current question
      function renderQuestion() {
        const question = quizData[currentQuestion];

        questionNumber.textContent = `Question ${currentQuestion + 1}`;
        questionType.textContent =
          question.type === "multiple" ? "Multiple Choice" : "Short Answer";
        questionText.textContent = question.question;

        // Clear previous content
        optionsContainer.innerHTML = "";
        feedbackContainer.innerHTML = "";

        if (question.type === "multiple") {
          // Render multiple choice options
          question.options.forEach((option, index) => {
            const optionDiv = document.createElement("div");
            optionDiv.className = "option";
            optionDiv.textContent = option;

            // Restore previous selection
            if (userAnswers[currentQuestion] === index) {
              optionDiv.classList.add("selected");
            }

            // Disable if already checked
            if (answerChecked[currentQuestion]) {
              if (index === question.correct) {
                optionDiv.classList.add("correct");
              } else if (userAnswers[currentQuestion] === index) {
                optionDiv.classList.add("incorrect");
              }
            } else {
              optionDiv.addEventListener("click", () => {
                // Remove previous selection
                document
                  .querySelectorAll(".option")
                  .forEach((opt) => opt.classList.remove("selected"));
                optionDiv.classList.add("selected");
                userAnswers[currentQuestion] = index;
              });
            }

            optionsContainer.appendChild(optionDiv);
          });
        } else {
          // Render short answer input
          const input = document.createElement("input");
          input.type = "text";
          input.className = "short-answer";
          input.placeholder = "Type your answer here...";
          input.value = userAnswers[currentQuestion] || "";

          // Disable if already checked
          if (answerChecked[currentQuestion]) {
            input.disabled = true;
          } else {
            input.addEventListener("input", (e) => {
              userAnswers[currentQuestion] = e.target.value.trim();
            });
          }

          optionsContainer.appendChild(input);
        }

        // Show/hide buttons based on state
        if (answerChecked[currentQuestion]) {
          checkBtn.style.display = "none";
          nextBtn.style.display = "block";
          showFeedback();
        } else {
          checkBtn.style.display = "block";
          nextBtn.style.display = "none";
        }

        // Disable next button on last question if not checked
        if (
          currentQuestion === quizData.length - 1 &&
          !answerChecked[currentQuestion]
        ) {
          nextBtn.textContent = "Finish Quiz";
        } else {
          nextBtn.textContent = "Next Question";
        }
      }

      // Check answer
      checkBtn.addEventListener("click", () => {
        const question = quizData[currentQuestion];
        const userAnswer = userAnswers[currentQuestion];

        if (userAnswer === null || userAnswer === "") {
          alert("Please select or enter an answer!");
          return;
        }

        answerChecked[currentQuestion] = true;
        showFeedback();

        checkBtn.style.display = "none";
        nextBtn.style.display = "block";

        // Re-render to show correct/incorrect styling
        if (question.type === "multiple") {
          const options = document.querySelectorAll(".option");
          options.forEach((opt, index) => {
            opt.style.pointerEvents = "none";
            if (index === question.correct) {
              opt.classList.add("correct");
            } else if (index === userAnswer) {
              opt.classList.add("incorrect");
            }
          });
        } else {
          const input = document.querySelector(".short-answer");
          input.disabled = true;
        }
      });

      // Show feedback
      function showFeedback() {
        const question = quizData[currentQuestion];
        const userAnswer = userAnswers[currentQuestion];
        let isCorrect = false;

        if (question.type === "multiple") {
          isCorrect = userAnswer === question.correct;
        } else {
          isCorrect =
            userAnswer.toLowerCase() === question.answer.toLowerCase();
        }

        const feedbackDiv = document.createElement("div");
        feedbackDiv.className = `feedback ${isCorrect ? "correct" : "incorrect"}`;

        if (isCorrect) {
          feedbackDiv.textContent = "✓ Correct! Well done!";
        } else {
          if (question.type === "multiple") {
            feedbackDiv.textContent = `✗ Incorrect. The correct answer is: ${
              question.options[question.correct]
            }`;
          } else {
            feedbackDiv.textContent = `✗ Incorrect. The correct answer is: ${question.answer}`;
          }
        }

        feedbackContainer.appendChild(feedbackDiv);
      }

      // Next question
      nextBtn.addEventListener("click", () => {
        if (currentQuestion < quizData.length - 1) {
          currentQuestion++;
          renderQuestion();
          updateProgress();
        } else {
          showResults();
        }
      });

      // Update progress
      function updateProgress() {
        const answered = userAnswers.filter((ans) => ans !== null).length;
        const percentage = ((currentQuestion + 1) / quizData.length) * 100;

        progressText.textContent = `Question ${currentQuestion + 1} of ${
          quizData.length
        }`;
        answeredText.textContent = `${answered} answered`;
        progressFill.style.width = `${percentage}%`;
      }

      // Show results
      function showResults() {
        let correct = 0;
        let incorrect = 0;
        let skipped = 0;

        quizData.forEach((question, index) => {
          const userAnswer = userAnswers[index];

          if (userAnswer === null || userAnswer === "") {
            skipped++;
          } else {
            let isCorrect = false;
            if (question.type === "multiple") {
              isCorrect = userAnswer === question.correct;
            } else {
              isCorrect =
                userAnswer.toLowerCase() === question.answer.toLowerCase();
            }

            if (isCorrect) {
              correct++;
            } else {
              incorrect++;
            }
          }
        });

        const percentage = Math.round((correct / quizData.length) * 100);

        // Update results display
        document.getElementById("scorePercentage").textContent = `${percentage}%`;
        document.getElementById("correctCount").textContent = correct;
        document.getElementById("incorrectCount").textContent = incorrect;
        document.getElementById("skippedCount").textContent = skipped;

        // Feedback
        const feedback = document.getElementById("feedback");
        if (percentage >= 90) {
          feedback.className = "feedback excellent";
          feedback.textContent =
            " Excellent! You have a strong grasp of JavaScript ES6+ fundamentals!";
        } else if (percentage >= 70) {
          feedback.className = "feedback good";
          feedback.textContent =
            "👍 Good job! You understand most JavaScript ES6+ concepts well!";
        } else if (percentage >= 50) {
          feedback.className = "feedback average";
          feedback.textContent =
            " Not bad! Review the materials to improve your understanding.";
        } else {
          feedback.className = "feedback needs-improvement";
          feedback.textContent =
            "💪 Keep studying! Practice more to master JavaScript ES6+ fundamentals.";
        }

        // Show results
        quizCard.classList.add("hidden");
        document.getElementById("progressBar").classList.add("hidden");
        resultsCard.classList.remove("hidden");
      }

      // Start quiz
      init();
    </script>
  </body>
</html>
